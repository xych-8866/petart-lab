      clearTimeout(tid); let d=await r.json(); if(d.body)d=JSON.parse(d.body);
      if(!d.data)throw new Error('Unexpected response format: '+JSON.stringify(d).substring(0,500));
      let img=d.data[0].url;
      results.push(img);
      if(!state.authUser.isTestAccount && state.authUser.credits > 0){ 
  // 前端扣减（乐观更新）
  state.authUser.credits--; 
  const users = JSON.parse(localStorage.getItem(USERS_KEY)||'[]'); 
  const idx = users.findIndex(u=>u.email===state.authUser.email); 
  if(idx>=0){
    users[idx].credits = state.authUser.credits;
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
  }
  
  // 调用后端接口，同步扣减数据库中的次数

  }).catch(err => console.error('扣减后端次数失败:', err));
}
    }catch(e){clearTimeout(tid);console.error(`[Generate ${i+1}] Error:`,e);}
  }

<h2>1. The Golden Rule: Positive Reinforcement</h2>
<p>Never punish your dog for not understanding. Instead, reward the behavior you want with small treats, enthusiastic praise, or a favorite toy. Dogs repeat actions that bring them rewards.</p>
<h2>2. Essential Commands to Teach</h2>
<ul>
<li><strong>Sit</strong>: Hold a treat above your dog's nose and move it back over their head. As their nose goes up, their bottom goes down. Say "sit" the moment they sit, then reward.</li>
<li><strong>Stay</strong>: Ask your dog to sit, then open your palm in front of their face and say "stay". Take one step back, then immediately return and reward. Gradually increase distance and duration.</li>
<li><strong>Come</strong>: Use a long leash in a safe area. Say "come" in an excited voice and gently reel them in. Always reward heavily when they reach you.</li>
<li><strong>Down</strong>: From a sit, lure your dog's nose down to the ground with a treat, sliding it forward until they lie down. Say "down" as they lower.</li>
</ul>
<div class="product-card"><span class="pick-label">🛒 Training Tools</span><strong>Recommended Training Treats & Clickers</strong><p style="margin:0.5rem 0;">Small, low-calorie treats and a clicker for marker training.</p><a href="https://www.amazon.com/s?k=dog+training+treats+clicker&tag=petartlab-20" target="_blank">Shop on Amazon →</a></div>
<h2>3. Common Mistakes to Avoid</h2>

function renderPrivacy(){ const d=document.createElement('div'); d.className='container'; d.style.padding='3rem 1rem'; d.innerHTML=`<h1>Privacy Policy</h1><div class="card" style="line-height:1.8;"><p>Last updated: May 27, 2026</p><h2>1. Introduction</h2><p>PetArt Lab ("we", "our", or "us") operates https://www.petartlab.net (the "Service"). This page informs you of our policies regarding the collection, use, and disclosure of personal data when you use our Service.</p><h2>2. Information We Collect</h2><p>We collect your email address and username for account registration. We also collect uploaded pet photos, which are processed temporarily for image generation. We do NOT collect full name, physical address, phone number, or payment card details (handled by Creem).</p><h2>3. Legal Basis for Processing</h2><p>We process your personal data based on: (a) your consent when you register an account; (b) the necessity to perform our contract with you (providing the AI generation service); and (c) our legitimate interest in preventing fraud and abuse.</p><h2>4. How We Use Your Information</h2><p>Your information is used solely for: providing and maintaining the Service; processing image generation requests; managing your account; and preventing fraud or abuse.</p><h2>5. Data Sharing</h2><p>We do NOT sell, trade, or rent your personal information to third parties. Data is shared only with: (a) Creem, our payment processor; (b) AI service providers, solely for image generation.</p><h2>6. Cookies</h2><p>We use essential session cookies to maintain your login state and remember your cookie preferences. We also use analytics cookies to understand how our site is used and improve our Service. No third-party tracking cookies are used for advertising purposes. You can manage your cookie preferences via our cookie banner.</p><h2>7. Data Retention</h2><p>Account information is retained as long as your account is active. Uploaded pet photos are automatically deleted within 24 hours after processing. Generated images are stored according to your subscription plan (Free: not stored; Pro: 7 days; Max: 30 days; Ultra: 180 days). You may request early deletion at any time.</p><h2>8. Your Data Protection Rights</h2><p>You have the right to: access, update, or delete the personal information we hold about you; withdraw your consent at any time; object to processing of your personal data; request restriction of processing your personal data; and data portability. To exercise any of these rights, contact us at xych356761678@petartlab.net.</p><h2>9. Security</h2><p>All data transmissions are encrypted via HTTPS/TLS. We implement industry-standard security measures to protect your personal information from unauthorized access, alteration, or destruction.</p><h2>10. Children's Privacy</h2><p>Our Service is not directed to individuals under the age of 13. We do not knowingly collect personal information from children. If you believe your child has provided us with personal data, please contact us immediately.</p><h2>11. International Data Transfers</h2><p>Your information may be processed on servers located outside your country of residence. We ensure appropriate safeguards are in place to protect your data in accordance with this Privacy Policy.</p><h2>12. Changes to This Policy</h2><p>We may update this Privacy Policy from time to time. We will notify you of any changes by posting the new Privacy Policy on this page.</p><h2>13. Contact Us</h2><p>For questions about this Privacy Policy or to exercise your data rights, contact us at: xych356761678@petartlab.net. You also have the right to lodge a complaint with your local data protection supervisory authority.</p></div>`; return d; }
function renderRefund(){ const d=document.createElement('div'); d.className='container'; d.style.padding='3rem 1rem'; d.innerHTML=`<h1>Refund Policy</h1><div class="card" style="line-height:1.8;"><p>Last updated: May 27, 2026</p><h2>1. Overview</h2><p>14-day money-back guarantee.</p><h2>2. Calculation</h2><p>Refund = Paid Fee - (Images Used × Unit Price).</p><h2>3. Non-Refundable</h2><p>Over 30% quota used, bulk generation, abuse, or prior refunds.</p><h2>4. MoR</h2><p>Creem is the Merchant of Record.</p><h2>5. Contact</h2><p>xych356761678@petartlab.net</p></div>`; return d; }
function renderAccount(){
  if(!state.authUser){ const d=document.createElement('div'); d.className='text-center'; d.style.padding='5rem'; d.innerHTML='<p>Please sign in</p>'; return d; }
  const p=PLANS[state.authUser.plan]; const d=document.createElement('div'); d.className='container'; d.style.padding='3rem 1rem';
  d.innerHTML=`<div class="card mb-6"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;"><div style="display:flex;align-items:center;gap:1rem;"><div style="width:4rem;height:4rem;border-radius:9999px;background:linear-gradient(135deg,var(--color-amber-400),var(--color-orange-500));display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-weight:bold;">${state.authUser.username[0].toUpperCase()}</div><div><h2>${state.authUser.username}</h2><p style="color:var(--color-slate-500);">${state.authUser.email}</p></div></div><button class="btn btn-outline" onclick="handleLogout()">↪ Logout</button></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;"><div style="background:var(--color-amber-50);border-radius:0.75rem;padding:1rem;"><p style="font-size:0.875rem;color:var(--color-slate-500);">Current Plan</p><p style="font-size:1.25rem;font-weight:bold;color:var(--color-amber-600);">${p.name}</p></div><div style="background:var(--color-slate-50);border-radius:0.75rem;padding:1rem;"><p style="font-size:0.875rem;color:var(--color-slate-500);">Remaining</p><p style="font-size:1.25rem;font-weight:bold;">${state.authUser.credits}/${p.monthlyLimit}</p></div><div style="background:var(--color-slate-50);border-radius:0.75rem;padding:1rem;"><p style="font-size:0.875rem;color:var(--color-slate-500);">History</p><p style="font-size:1.25rem;font-weight:bold;">${p.historyDays} days</p></div></div><button class="btn btn-primary mt-6" style="width:100%;" onclick="state.showUpgradeModal=true;render();">Upgrade Plan</button></div>`;
  return d;
}

function handleFileSelect(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{state.selectedImage=ev.target.result;render();}; r.readAsDataURL(f); }
function toggleStyle(s){ if(!canSelectStyle(s)){state.showUpgradeModal=true;render();return;} if(state.selectedStyles.includes(s)){if(state.selectedStyles.length>1)state.selectedStyles=state.selectedStyles.filter(id=>id!==s);}else{if(state.selectedStyles.length<getMaxStylesCount())state.selectedStyles.push(s);else alert(`Your plan allows up to ${getMaxStylesCount()} style(s).`);} render(); }
function setBatch(c){ if(!state.authUser)return; if(state.authUser.isTestAccount){state.batchCount=c;render();return;} const p=state.authUser.plan; if(c===5&&(p==='free'||p==='pro')){state.showUpgradeModal=true;render();return;} if(c===10&&p!=='ultra'){state.showUpgradeModal=true;render();return;} state.batchCount=c;render(); }

function render() {
  const root=document.getElementById('root'); root.innerHTML='';
  const c=document.createElement('div'); c.style.minHeight='100vh';
  c.appendChild(renderHeader());
  let content;
  const page=state.currentPage;
  if(page.startsWith('article-')) {
    const articleId=page.replace('article-','');
    content=renderArticle(articleId);
  } else {
    switch(page){
      case 'home': content=renderHome(); break;
      case 'guides': content=renderGuides(); break;
      case 'pricing': content=renderPricing(); break;
      case 'terms': content=renderTerms(); break;
      case 'privacy': content=renderPrivacy(); break;
      case 'refund': content=renderRefund(); break;
      case 'account': content=renderAccount(); break;
      default: content=renderHome();
    }
  }
  c.appendChild(content);
  const footer=document.createElement('footer'); footer.style.marginTop='3rem'; footer.style.padding='2rem 0'; footer.style.borderTop='1px solid var(--color-slate-200)';
  footer.innerHTML=`<div class="container" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;"><div style="display:flex;align-items:center;gap:0.5rem;color:var(--color-slate-600);"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.5 5.5L18 9l-4.5 2L12 16l-1.5-5L6 9l4.5-1.5z"/></svg><span style="font-size:0.875rem;">PetArt Lab</span></div><div style="display:flex;gap:1.5rem;font-size:0.875rem;color:var(--color-slate-500);"><span onclick="navigateTo('guides')" style="cursor:pointer;">Guides</span><span onclick="navigateTo('pricing')" style="cursor:pointer;">Pricing</span><span onclick="navigateTo('terms')" style="cursor:pointer;">Terms</span><span onclick="navigateTo('privacy')" style="cursor:pointer;">Privacy</span><span onclick="navigateTo('refund')" style="cursor:pointer;">Refund</span></div><a href="https://www.robloxhelp.xyz" target="_blank" style="font-size:0.875rem;color:var(--color-slate-500);text-decoration:none;">Roblox Tips</a><span style="font-size:0.75rem;color:var(--color-slate-400);">This site is intended for users aged 13 and above.</span></div>`;
  c.appendChild(footer);

  if(state.showAuthModal){
    const o=document.createElement('div'); o.className='modal-overlay'; o.innerHTML=`<div class="modal-content"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;"><h3>${state.authMode==='login'?'Sign In':'Create Account'}</h3><button onclick="closeAuthModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">×</button></div><form onsubmit="handleAuth(event)" style="display:flex;flex-direction:column;gap:1rem;"><input class="input-field" type="email" placeholder="Email" value="${state.authForm.email}" oninput="state.authForm.email=this.value" required><div style="position:relative;"><input class="input-field" type="${state.showPassword?'text':'password'}" placeholder="Password" value="${state.authForm.password}" oninput="state.authForm.password=this.value" required><button type="button" onclick="state.showPassword=!state.showPassword;render();" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;">${state.showPassword?'🙈':'👁'}</button></div>${state.authMode==='register'?`<input class="input-field" type="text" placeholder="Username" value="${state.authForm.username}" oninput="state.authForm.username=this.value">`:''}<button class="btn btn-primary" type="submit">${state.authMode==='login'?'Sign In':'Create Account'}</button></form><p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--color-slate-500);">${state.authMode==='login'?"Don't have an account? ":"Already have an account? "}<span onclick="state.authMode=state.authMode==='login'?'register':'login';render();" style="color:var(--color-amber-600);cursor:pointer;font-weight:500;">${state.authMode==='login'?'Sign Up':'Sign In'}</span></p></div>`;
    o.onclick=function(e){if(e.target===this){state.showAuthModal=false;render();}}; c.appendChild(o);
  }
  if(state.showUpgradeModal){
    const o=document.createElement('div'); o.className='modal-overlay'; o.innerHTML=`<div class="modal-content wide"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;"><h3>Select Plan</h3><button onclick="closeUpgradeModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">×</button></div><div class="grid-4">${Object.entries(PLANS).map(([k,pl])=>`<div class="plan-card ${state.authUser?.plan===k?'active':''}"><h4>${pl.name}</h4><div style="font-size:1.5rem;font-weight:bold;">$${k==='free'?'0':k==='pro'?'9.99':k==='max'?'19.99':'29.99'}<span style="font-size:0.875rem;">/mo</span></div><button class="btn ${state.authUser?.plan===k?'btn-outline':'btn-primary'}" style="width:100%;margin-top:1rem;" onclick="handleUpgrade('${k}')" ${state.authUser?.plan===k?'disabled':''}>${state.authUser?.plan===k?'Current':'Select'}</button></div>`).join('')}</div></div>`;
    o.onclick=function(e){if(e.target===this){state.showUpgradeModal=false;render();}}; c.appendChild(o);
  }

  // Printful 定制弹窗（注意：按钮已禁用，但弹窗逻辑保留，以防后续恢复）
  if(state.showPrintfulModal){
    const o=document.createElement('div'); o.className='modal-overlay';
    o.innerHTML=`<div class="modal-content wide"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;"><h3>🖼️ Order Custom Framed Print</h3><button onclick="state.showPrintfulModal=false;state.selectedProduct=null;render();" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">×</button></div>
    <h4 style="margin-bottom:0.75rem;">Select Product</h4>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:1rem;">${state.printfulProducts.map(p=>`<div class="product-option ${state.selectedProduct&&state.selectedProduct.variant_id===p.variant_id?'active':''}" onclick="selectPrintfulProduct('${p.variant_id}')"><div style="font-weight:600;">${p.product_name}</div><div style="margin-left:auto;color:var(--color-amber-600);font-weight:600;">$${p.price}</div></div>`).join('')}${state.printfulProducts.length===0?'<p style="color:var(--color-slate-400);">Loading products...</p>':''}</div>
    <h4 style="margin-bottom:0.75rem;">Shipping Address</h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <input class="input-field" type="text" placeholder="Full Name" value="${state.shippingAddress.name}" oninput="state.shippingAddress.name=this.value">
      <input class="input-field" type="text" placeholder="Address Line 1" value="${state.shippingAddress.address1}" oninput="state.shippingAddress.address1=this.value">
      <input class="input-field" type="text" placeholder="City" value="${state.shippingAddress.city}" oninput="state.shippingAddress.city=this.value">
      <input class="input-field" type="text" placeholder="State (e.g. CA)" value="${state.shippingAddress.state}" oninput="state.shippingAddress.state=this.value">
      <input class="input-field" type="text" placeholder="Country (e.g. US)" value="${state.shippingAddress.country}" oninput="state.shippingAddress.country=this.value">
      <input class="input-field" type="text" placeholder="ZIP Code" value="${state.shippingAddress.zip}" oninput="state.shippingAddress.zip=this.value">
    </div>
    <button class="btn btn-primary mt-4" style="width:100%;" onclick="submitPrintfulOrder()" ${!state.selectedProduct?'disabled':''}>Place Order</button></div>`;
    o.onclick=function(e){if(e.target===this){state.showPrintfulModal=false;state.selectedProduct=null;render();}}; c.appendChild(o);
  }

  root.appendChild(c);
}

window.addEventListener('DOMContentLoaded', () => {
  const savedEmail = localStorage.getItem('logged_in_email');
  if (savedEmail) {
    const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
    const savedUser = users.find(u => u.email === savedEmail);
    if (savedUser) {
      state.authUser = savedUser;
    }
  }
  refreshFreeUserCredits();  
  // 强制同步：页面加载时从后端拉取真实额度
  if (state.authUser) {
    fetch(`${API_BASE_URL}/user-status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: state.authUser.email })
    })
    .then(res => res.json())
    .then(data => {
      if (data && data.credits !== undefined) {
        state.authUser.credits = data.credits;
        state.authUser.plan = data.plan;
        state.authUser.lastResetDate = data.lastResetDate;
        const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
        const idx = users.findIndex(u => u.email === state.authUser.email);
        if (idx !== -1) {
          users[idx].credits = data.credits;
          users[idx].plan = data.plan;
          users[idx].lastResetDate = data.lastResetDate;
          localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }
        render();
      }
    })
    .catch(err => console.error('强制同步失败:', err));
  }
  state.currentPage = window.location.hash.slice(1) || 'home';
  render();
});
</script>
</body>
</html>
