async function generateImage() {
  if(!state.selectedImage||!state.authUser)return;
  const plan=PLANS[state.authUser.plan];
  if (state.authUser.plan === 'free') {
    const today = new Date().toDateString();
    const lastReset = state.authUser.lastResetDate ? new Date(state.authUser.lastResetDate).toDateString() : null;
    if (lastReset !== today) {
      state.authUser.credits = 1;
      state.authUser.lastResetDate = new Date().toISOString();
      const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
      const idx = users.findIndex(u => u.email === state.authUser.email);
      if (idx >= 0) {
        users[idx].credits = 1;
        users[idx].lastResetDate = state.authUser.lastResetDate;
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
      }
      render();
    }
  }
  const needed = state.batchCount * state.selectedStyles.length;
  if(!state.authUser.isTestAccount&&state.authUser.credits<needed){state.showUpgradeModal=true;render();return;}

  // ============ Creem Content Moderation (通过后端代理，避免CORS) ============
  const promptsToCheck = state.selectedStyles.map(sid => {
    const style = ART_STYLES.find(x => x.id === sid);
    return style ? style.name : '';
  }).join(', ') + ' - pet portrait generation from user-uploaded photo';

  let moderationSuccess = false;
  let moderationError = false;

  try {
    // 调用自己的后端代理，而不是直接请求 Creem API
    const moderationRes = await fetch(`${API_BASE_URL}/moderation-proxy`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ prompt: promptsToCheck })
    });

    if (moderationRes.ok) {
      const moderationData = await moderationRes.json();
      if (moderationData.decision === 'allow') {
        moderationSuccess = true;
      } else if (moderationData.decision === 'deny') {
        alert('Your request contains prohibited content. Please review our Terms of Service.');
        return;
      } else if (moderationData.decision === 'flag') {
        alert('Your request needs review. Please try again with different content.');
        return;
      } else {
        moderationError = true;
      }
    } else {
      moderationError = true;
    }
  } catch (err) {
    console.error('Moderation API error:', err);
    moderationError = true;
  }

  if (moderationError || !moderationSuccess) {
    alert('Content moderation service error. Please try again later.');
    return;
  }
  // ============ Moderation End ============

  state.isGenerating=true;state.error=null;state.generatedImages=[];render();
  if(!state.authUser.isTestAccount)incrementDailyCount(needed);
  const tasks=[];
  for(let i=0;i<state.batchCount;i++){ for(const sid of state.selectedStyles){ const s=ART_STYLES.find(x=>x.id===sid); if(s)tasks.push({style:s,batchIndex:i,pose:getPoseVariation(i)}); } }
  const results=[]; const SUFFIX='This is a single, complete, independent picture. Do NOT split the image into multiple small panels or grids. Show only one pose, one angle, one composition in this single image.';
  for(let i=0;i<tasks.length;i++){
    const t=tasks[i]; const seed=Math.floor(Math.random()*2147483647); const prompt=`${t.style.prompt}, ${t.pose}, ${SUFFIX}`;
    const ctrl=new AbortController(); const tid=setTimeout(()=>ctrl.abort(),60000);
    try{
      const r=await fetch(API_WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'doubao-seedream-4-5-251128',prompt,image:[state.selectedImage],size:'2K',response_format:'url',watermark:true,seed,image_strength:0.25,guidance_scale:7.5,num_images:1}),signal:ctrl.signal});
      clearTimeout(tid); let d=await r.json(); if(d.body)d=JSON.parse(d.body);
      if(!d.data)throw new Error('Unexpected response format: '+JSON.stringify(d).substring(0,500));
      let img=d.data[0].url;
      results.push(img);
      if(!state.authUser.isTestAccount && state.authUser.credits > 0){ 
        state.authUser.credits--; 
        const users = JSON.parse(localStorage.getItem(USERS_KEY)||'[]'); 
        const idx = users.findIndex(u=>u.email===state.authUser.email); 
        if(idx>=0){
          users[idx].credits = state.authUser.credits;
          localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }
        fetch(`${API_BASE_URL}/use-credit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: state.authUser.email, amount: 1 })
        }).catch(err => console.error('扣减后端次数失败:', err));
      }
    }catch(e){clearTimeout(tid);console.error(`[Generate ${i+1}] Error:`,e);}
  }
  state.generatedImages=results;state.isGenerating=false;if(results.length===0)alert('Generation failed, please try again');render();
}

      state.printfulProducts = [];

      }

function navigateToArticle(event, file) {
  event.preventDefault();
  // 保存当前滚动位置
  sessionStorage.setItem('scrollPos', window.scrollY);
  // 更新 hash，让浏览器记录历史
  const articleId = file.replace(/\.html$/, '');
  window.location.hash = `article-${articleId}`;
  state.currentPage = 'article';
  state.currentArticleFile = file;
  render();
}

async function renderArticlePage() {
  if (!state.currentArticleFile) { navigateTo('home'); return null; }

  // 在 </body> 之前插入右下角的返回链接
  const backLink = `
    <div style="text-align:right; margin-top:2rem; margin-bottom:1rem;">

  `;
  html = html.replace('</body>', backLink + '</body>');
  
  const main = document.createElement('main');
  main.className = 'container-narrow';
  main.style.padding = '3rem 1rem';
  main.innerHTML = html;
  return main;
}

  c.appendChild(footer);

  if(state.showAuthModal){
    const o=document.createElement('div'); o.className='modal-overlay'; o.innerHTML=`<div class="modal-content"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;"><h3>${state.authMode==='login'?'Sign In':'Create Account'}</h3><button onclick="closeAuthModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">×</button></div><form onsubmit="handleAuth(event)" style="display:flex;flex-direction:column;gap:1rem;"><input class="input-field" type="email" placeholder="Email" value="${state.authForm.email}" oninput="state.authForm.email=this.value" required><div style="position:relative;"><input class="input-field" type="${state.showPassword?'text':'password'}" placeholder="Password" value="${state.authForm.password}" oninput="state.authForm.password=this.value" required><button type="button" onclick="state.showPassword=!state.showPassword;render();" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;">${state.showPassword?'🙈':'👁'}</button></div>${state.authMode==='register'?`<input class="input-field" type="text" placeholder="Username" value="${state.authForm.username}" oninput="state.authForm.username=this.value">`:''}<button class="btn btn-primary" type="submit">${state.authMode==='login'?'Sign In':'Create Account'}</button></form><p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--color-slate-500);">${state.authMode==='login'?"Don't have an account? ":"Already have an account? "}<span onclick="state.authMode=state.authMode==='login'?'register':'login';render();" style="color:var(--color-amber-600);cursor:pointer;font-weight:500;">${state.authMode==='login'?'Sign Up':'Sign In'}</span></p></div>`;
    o.onclick=function(e){if(e.target===this){state.showAuthModal=false;render();}}; c.appendChild(o);
  }
  if(state.showUpgradeModal){
    const o=document.createElement('div'); o.className='modal-overlay'; o.innerHTML=`<div class="modal-content wide"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;"><h3>Select Plan</h3><button onclick="closeUpgradeModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">×</button></div><div class="grid-4">${Object.entries(PLANS).map(([k,pl])=>`<div class="plan-card ${state.authUser?.plan===k?'active':''}"><h4>${pl.name}</h4><div style="font-size:1.5rem;font-weight:bold;">$${k==='free'?'0':k==='pro'?'9.99':k==='max'?'19.99':'29.99'}<span style="font-size:0.875rem;">/mo</span></div><button class="btn ${state.authUser?.plan===k?'btn-outline':'btn-primary'}" style="width:100%;margin-top:1rem;" onclick="handleUpgrade('${k}')" ${state.authUser?.plan===k?'disabled':''}>${state.authUser?.plan===k?'Current':'Select'}</button></div>`).join('')}</div></div>`;
    o.onclick=function(e){if(e.target===this){state.showUpgradeModal=false;render();}}; c.appendChild(o);
  }

  if(state.showPrintfulModal){
    const o=document.createElement('div'); o.className='modal-overlay';
    o.innerHTML=`<div class="modal-content wide"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;"><h3>🖼️ Order Custom Framed Print</h3><button onclick="state.showPrintfulModal=false;state.selectedProduct=null;render();" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">×</button></div>
    <h4 style="margin-bottom:0.75rem;">Select Product</h4>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:1rem;">${state.printfulProducts.map(p=>`<div class="product-option ${state.selectedProduct&&state.selectedProduct.variant_id==p.variant_id?'active':''}" onclick="selectPrintfulProduct('${p.variant_id}')"><div style="font-weight:600;">${p.product_name}</div><div style="margin-left:auto;color:var(--color-amber-600);font-weight:600;">$${p.price}</div></div>`).join('')}${state.printfulProducts.length===0?'<p style="color:var(--color-slate-400);">Loading products...</p>':''}</div>
    <h4 style="margin-bottom:0.75rem;">Shipping Address</h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
      <input class="input-field" type="text" placeholder="Full Name" value="${state.shippingAddress.name}" oninput="state.shippingAddress.name=this.value">
      <input class="input-field" type="text" placeholder="Address Line 1" value="${state.shippingAddress.address1}" oninput="state.shippingAddress.address1=this.value">
      <input class="input-field" type="text" placeholder="City" value="${state.shippingAddress.city}" oninput="state.shippingAddress.city=this.value">
      <input class="input-field" type="text" placeholder="State (e.g. CA)" value="${state.shippingAddress.state}" oninput="state.shippingAddress.state=this.value">
      <input class="input-field" type="text" placeholder="Country (e.g. US)" value="${state.shippingAddress.country}" oninput="state.shippingAddress.country=this.value">
      <input class="input-field" type="text" placeholder="ZIP Code" value="${state.shippingAddress.zip}" oninput="state.shippingAddress.zip=this.value">
    </div>
    <button class="btn btn-primary mt-4" style="width:100%;" onclick="submitPrintfulOrder()" ${!state.selectedProduct?'disabled':''}>Place Order</button></div>`;
    o.onclick=function(e){if(e.target===this){state.showPrintfulModal=false;state.selectedProduct=null;render();}}; c.appendChild(o);
  }

  root.appendChild(c);
}

window.addEventListener('DOMContentLoaded', () => {
  const savedEmail = localStorage.getItem('logged_in_email');
  if (savedEmail) {
    const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
    const savedUser = users.find(u => u.email === savedEmail);
    if (savedUser) {
      state.authUser = savedUser;
    }
  }
  refreshFreeUserCredits();  

  // 从后端同步用户状态
  if (state.authUser) {
    fetch(`${API_BASE_URL}/user-status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: state.authUser.email })
    })
    .then(res => res.json())
    .then(data => {
      if (data && data.credits !== undefined) {
        state.authUser.credits = data.credits;
        state.authUser.plan = data.plan;
        state.authUser.lastResetDate = data.lastResetDate;
        const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
        const idx = users.findIndex(u => u.email === state.authUser.email);
        if (idx !== -1) {
          users[idx].credits = data.credits;
          users[idx].plan = data.plan;
          users[idx].lastResetDate = data.lastResetDate;
          localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }
        render();
      }
    })
    .catch(err => console.error('强制同步失败:', err));
  }

  // 关键修复：根据 hash 设置正确的页面状态
  const hash = window.location.hash.slice(1);
  if (hash.startsWith('article-')) {
    const file = hash.replace('article-', '') + '.html';
    state.currentPage = 'article';
    state.currentArticleFile = file;
  } else {
    state.currentPage = hash || 'home';
    state.currentArticleFile = null;
  }
  render();
});
</script>
</body>
</html>
