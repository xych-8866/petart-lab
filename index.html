function getDailyCount() {
  const data = localStorage.getItem(DAILY_COUNT_KEY);
  if (!data) return 0;
  try {
    const { count, date } = JSON.parse(data);
    if (date !== new Date().toDateString()) { localStorage.removeItem(DAILY_COUNT_KEY); return 0; }
    return count;
  } catch(e) { return 0; }
}

function incrementDailyCount(amount) {
  const current = getDailyCount();
  localStorage.setItem(DAILY_COUNT_KEY, JSON.stringify({
    count: current + amount,
    date: new Date().toDateString()

}

  const poses = ['relaxed sitting, front view','playful running, side profile','lying down, looking up','looking back over shoulder','standing alert, curious expression'];

  const plan = state.authUser.plan;
  if (plan === 'free' || plan === 'pro') return styleId === 'ghibli';
  return true;

  if (state.authUser.plan === 'max') return 6;

function addWatermark(imageUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      ctx.font = `bold ${Math.max(24, img.width/20)}px Arial`;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 2;
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.strokeText(WATERMARK_TEXT, img.width-20, img.height-20);
      ctx.fillText(WATERMARK_TEXT, img.width-20, img.height-20);
      resolve(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.src = imageUrl;
  });
}

  state.error = null;
  state.generatedImages = [];
  render();

          size: '2K',
          response_format: 'url',
          watermark: true,
          seed: randomSeed,
          image_strength: 0.25,
          guidance_scale: 7.5,
          num_images: 1

        signal: controller.signal

    const newUser = {

      username: state.authForm.username || state.authForm.email.split('@')[0],
      plan: 'free',

      newUser.credits = 999999;
      newUser.isTestAccount = true;
    }
    users.push(newUser);
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
    state.authUser = newUser;
    state.showAuthModal = false;
    state.authForm = { email:'', password:'', username:'' };
  } else {
    const users = JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
    const found = users.find(u => u.email === state.authForm.email && u.password === state.authForm.password);

    overlay.className = 'modal-overlay animate-scale-in';
    overlay.id = 'auth-modal-overlay';
    overlay.innerHTML = `
      <div class="modal-content" id="auth-modal-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
          <h3 style="font-size:1.25rem;font-weight:bold;">${state.authMode === 'login' ? 'Sign In' : 'Create Account'}</h3>
          <button onclick="closeAuthModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">×</button>
        </div>
        <form onsubmit="handleAuth(event)" style="display:flex;flex-direction:column;gap:1rem;">
          <input class="input-field" type="email" placeholder="Email" value="${state.authForm.email}" oninput="state.authForm.email=this.value" required>
          <div style="position:relative;">
            <input class="input-field" type="${state.showPassword ? 'text' : 'password'}" placeholder="Password" value="${state.authForm.password}" oninput="state.authForm.password=this.value" required>
            <button type="button" onclick="state.showPassword=!state.showPassword;render();" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;">${state.showPassword ? '🙈' : '👁'}</button>
          </div>
          ${state.authMode === 'register' ? `<input class="input-field" type="text" placeholder="Username" value="${state.authForm.username}" oninput="state.authForm.username=this.value">` : ''}
          <button class="btn btn-primary" type="submit">${state.authMode === 'login' ? 'Sign In' : 'Create Account'}</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--color-slate-500);">
          ${state.authMode === 'login' ? "Don't have an account? " : "Already have an account? "}
          <span onclick="state.authMode=state.authMode==='login'?'register':'login';render();" style="color:var(--color-amber-600);cursor:pointer;font-weight:500;">${state.authMode === 'login' ? 'Sign Up' : 'Sign In'}</span>
        </p>
      </div>`;
    overlay.onclick = function(e) {
      if (e.target === this) { state.showAuthModal = false; render(); }
    };
    container.appendChild(overlay);
  }

  if (state.showUpgradeModal) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay animate-scale-in';
    overlay.id = 'upgrade-modal-overlay';
    overlay.innerHTML = `
      <div class="modal-content wide" id="upgrade-modal-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
          <h3 style="font-size:1.25rem;font-weight:bold;">Select Plan</h3>
          <button onclick="closeUpgradeModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">×</button>
        </div>
        <div class="grid-4">
          ${Object.entries(PLANS).map(([key,plan]) => `
            <div class="plan-card ${state.authUser?.plan === key ? 'active' : ''}">
              <h4>${plan.name}</h4>
              <div style="font-size:1.5rem;font-weight:bold;">$${key==='free'?'0':key==='pro'?'9.99':key==='max'?'19.99':'29.99'}<span style="font-size:0.875rem;">/mo</span></div>
              <button class="btn ${state.authUser?.plan === key ? 'btn-outline' : 'btn-primary'}" style="width:100%;margin-top:1rem;" onclick="handleUpgrade('${key}')" ${state.authUser?.plan === key ? 'disabled' : ''}>${state.authUser?.plan === key ? 'Current' : 'Select'}</button>
            </div>
          `).join('')}
        </div>
      </div>`;
    overlay.onclick = function(e) {
      if (e.target === this) { state.showUpgradeModal = false; render(); }
    };
    container.appendChild(overlay);
  }

  root.appendChild(container);
}

window.addEventListener('DOMContentLoaded', () => {
  state.currentPage = window.location.hash.slice(1) || 'home';
  render();
});
</script>
</body>
</html>
